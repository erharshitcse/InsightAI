<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightAI Professional Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Custom Tailwind Config (Optional, to match our local theme)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'slate-bg': '#0f172a',
                        'slate-card': '#1e293b',
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 p-6 hidden md:block">
        <h1 class="text-3xl font-bold text-blue-500 mb-10 text-center">InsightAI</h1>
        <div class="space-y-4">
            <p class="text-xs font-semibold text-slate-500 uppercase">Menu</p>
            <a href="/" class="flex items-center space-x-3 text-slate-400 p-2 rounded-lg hover:bg-slate-800">
                <span>🏠 Home</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-2 bg-blue-600/20 text-blue-400 rounded-lg">
                <span>📊 Dashboard</span>
            </a>
        </div>
        
        <div class="mt-12">
            <input type="file" id="fileInput" class="hidden" onchange="uploadFile()">
            <button onclick="document.getElementById('fileInput').click()" class="w-full bg-slate-700 py-3 rounded-lg text-sm font-semibold hover:bg-slate-600 transition">
                📁 Upload CSV
            </button>
            <p id="uploadStatus" class="hidden text-emerald-400 text-xs mt-3 text-center">✅ Ready to Analyze</p>
        </div>
    </aside>

    <main class="flex-1 p-8 lg:p-12">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
                <h2 class="text-4xl font-extrabold">Analytics Center</h2>
                <div class="flex items-center space-x-3 glass-panel py-2 px-4 rounded-full">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-sm text-slate-400">Gemini AI Active</span>
                </div>
            </div>

            <div class="glass-panel mb-10 shadow-xl">
                <div class="flex gap-4 items-center">
                    <div class="w-10 h-10 flex items-center justify-center bg-blue-600/10 text-blue-400 rounded-full">
                        🔍
                    </div>
                    <input type="text" id="queryInput" placeholder="Ask your data anything (e.g., 'Compare revenue by region')..." 
                           class="flex-1 bg-transparent border-none outline-none text-xl p-2 text-white placeholder-slate-500"
                           onkeypress="if(event.key==='Enter') runQuery()">
                    <button onclick="runQuery()" class="primary-btn">Analyze</button>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="glass-panel xl:col-span-2 min-h-[500px]">
                    <h3 class="text-2xl font-bold mb-6 text-slate-300">AI Visual</h3>
                    <div id="loading" class="hidden text-center text-blue-400 italic pt-20">Gemini is thinking...</div>
                    <canvas id="chartCanvas"></canvas>
                </div>

                <div class="glass-panel max-h-[500px] overflow-auto">
                    <h3 class="text-2xl font-bold mb-6 text-slate-300">Data View</h3>
                    <div id="tableContainer">
                        <p class="text-slate-500 italic text-center pt-20">Your insights will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
